<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReupManager — Quản lý team reup video</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ĐĂNG NHẬP -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">🎬</div>
      <h1>ReupManager</h1>
      <p class="login-sub">Hệ thống quản lý team reup video</p>
      <form id="login-form">
        <label>Tên đăng nhập</label>
        <input type="text" id="login-username" placeholder="admin" autocomplete="username" required />
        <label>Mật khẩu</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required />
        <div id="login-error" class="login-error"></div>
        <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
      </form>
      <p class="login-hint">Lần đầu dùng: <b>admin</b> / <b>admin123</b></p>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="app hidden">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="brand-logo">🎬</span>
        <span class="brand-name">ReupManager</span>
      </div>
      <nav id="nav" class="nav"></nav>
      <div class="sidebar-footer">
        <div class="user-box">
          <div class="user-avatar" id="user-avatar">A</div>
          <div class="user-info">
            <div class="user-name" id="user-name">Admin</div>
            <div class="user-role" id="user-role">Quản trị</div>
          </div>
        </div>
        <button id="logout-btn" class="btn btn-ghost btn-block">Đăng xuất</button>
      </div>
    </aside>

    <div class="backdrop" id="backdrop"></div>

    <main class="main">
      <header class="topbar">
        <button id="menu-toggle" class="menu-toggle">☰</button>
        <h2 id="page-title">Tổng quan</h2>
        <div class="topbar-right" id="topbar-right"></div>
      </header>
      <div id="view" class="view"></div>
    </main>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Tiêu đề</h3>
        <button id="modal-close" class="modal-close">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
